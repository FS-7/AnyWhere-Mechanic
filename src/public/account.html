<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/account.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <title>Document</title>
</head>
<body>
    <div class="container">
        <div class="navbar">
            <a href="/" class="logo">ANYWHERE MECHANIC</a>
            <div class="right">
                <a href="/" class="link">HOME</a>
                <a href="my_booking.html" class="link">MY BOOKINGS</a>
                <a href="booking.html" class="link">BOOKINGS</a>
                <a href="garage.html" class="link">REGISTER GARAGE</a>
            </div>
            <div class="left">
                <a href="#" class="leftItems">
                    <div class="bi bi-bell"></div>
                </a>
                <a href="admin.html" class="leftItems">
                    <div class="bi bi-person-fill-lock"></div>
                </a>
                <a href="account.html" class="leftItems">
                    <div class="bi bi-person-circle"></div>
                </a>
                <a id="logout" class="leftItems">
                    <div class="bi bi-box-arrow-right"></div>
                </a>
            </div>
        </div>
        <div class="content">
            <table id="table_user" class="table_user">
                <legend>User Information:</legend>
                <tr><th></th><th>Current</th><th>Update</th></tr>
                <tr>
                    <td>First name: </td>
                    <td id="userfirstname"></td>
                    <td>
                        <form id="firstname_form"><input type="text" maxlength="32" name="firstname" required /><button class="button" type="submit" ><p class="bi bi-check2"></p></button></form>
                    </td>
                </tr>
                <tr>
                    <td>Last name: </td>
                    <td id="userlastname"></td>
                    <td>
                        <form id="lastname_form"><input type="text" maxlength="32" name="lastname" required /><button class="button" type="submit" ><p class="bi bi-check2"></p></button></form>
                    </td>
                </tr>
                <tr>
                    <td>Phone: </td>
                    <td id="userphone"></td>
                    <td>
                        <form id="phone_form"><input type="text" minlength="10" maxlength="10" name="phone" required /><button class="button" type="submit" ><p class="bi bi-check2"></p></button></form>
                    </td>
                </tr>
                <tr>
                    <td>Email: </td>
                    <td id="useremail"></td>
                    <td>
                        <form id="email_form"><input type="email" name="email" required /><button class="button" type="submit" ><p class="bi bi-check2"></p></button></form>
                    </td>
                </tr>
                <tr>
                    <td>Are you a Mechanic?: </td>
                    <td id="mechanic"></td>
                    <td>
                        <form id="mechanic_form"><input type="range" min="0" max="1" name="mechanic" /><button class="button" type="submit" ><p class="bi bi-check2"></p></button></form>
                    </td>
                </tr>
            </table>
            <br>
            <legend>Garage Information:</legend>
            <table id="table_garages" class="table_garages">
                
            </table>
        </div>
    </div>
    <script src="js/account.js"></script>
</body>
</html>
