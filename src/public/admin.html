<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anywhere Mechanic</title>
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/admin.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>

<body>
    <div class="container">
        <div class="navbar">
            <a href="/" class="logo">ANYWHERE MECHANIC</a>
            <div class="right">
                <a href="/" class="link">HOME</a>
                <a href="my_booking.html" class="link">MY BOOKINGS</a>
                <a href="booking.html" class="link">BOOKINGS</a>
                <a href="garage.html" class="link">REGISTER GARAGE</a>
            </div>
            <div class="left">
                <a href="#" class="leftItems">
                    <div class="bi bi-bell"></div>
                </a>
                <a href="admin.html" class="leftItems">
                    <div class="bi bi-person-fill-lock"></div>
                </a>
                <a href="account.html" class="leftItems">
                    <div class="bi bi-person-circle"></div>
                </a>
                <a id="logout" class="leftItems">
                    <div class="bi bi-box-arrow-right"></div>
                </a>
            </div>
        </div>
        <div class="content">
            <table id="table_user" class="table_user">
                <legend>Admin Information:</legend>
                <tr><th></th><th>Current</th><th>Update</th></tr>
                <tr>
                    <td>EMAIL: </td>
                    <td id="useremail"></td>
                    <td>
                        <form id="email"><input type="email" name="email" maxlength="256" required /><button class="button" type="submit" ><p class="bi bi-check2"></p></button></form>
                    </td>
                </tr>
                <tr>
                    <td>PHONE: </td>
                    <td id="userphone"></td>
                    <td>
                        <form id="phone"><input type="text" name="phone" minlength="10" maxlength="10" required /><button class="button" type="submit" ><p class="bi bi-check2"></p></button></form>
                    </td>
                </tr>
                <tr>
                    <td>Password: </td>
                    <td>**************</td>
                    <td>
                        <form id="update_password" class="form">
                            <div class="form-group">
                                <label for="old_password">Old Password:</label>
                                <input type="password" id="old_password" name="old_password" minlength="8" maxlength="32" required />
                            </div>
                            <div class="form-group">
                                <label for="password">New Password:</label>
                                <input type="password" id="password" name="password" minlength="8" maxlength="32" required />
                            </div>
                            <div class="form-group">
                                <label for="password2">New Password:</label>
                                <input type="password" id="password2" name="password2" minlength="8" maxlength="32" required />
                            </div>
                            <input type="submit" value="Update" class="submit"></input>
                        </form>
                    </td>
                </tr>
            </table>
            <legend>Users: </legend>
            <table id="users" class="table_users"></table>

            <legend>Garages Information:</legend>
            <table id="table_garages" class="table_garages"></table>
            
            <legend>Bookings:</legend>
            <table class="table_booking" id="table_booking" ></table>
        </div>
    </div>
</body>
<script type="text/javascript" src="js/admin.js"></script>
</html>
