<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anywhere Mechanic</title>
    <link rel="stylesheet" href="css/shared.css" />
    <link rel="stylesheet" href="css/index.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
</head>

<body>
    <div class="container">
        <div class="navbar">
            <a href="/" class="logo">ANYWHERE MECHANIC</a>
            <div class="right">
                <a href="/" class="link">HOME</a>
                <a href="my_booking.html" class="link">MY BOOKINGS</a>
                <a href="booking.html" class="link">BOOKINGS</a>
                <a href="garage.html" class="link">REGISTER GARAGE</a>
            </div>
            <div class="left">
                <a href="#" class="leftItems">
                    <div class="bi bi-bell"></div>
                </a>
                <a href="admin.html" class="leftItems">
                    <div class="bi bi-person-fill-lock"></div>
                </a>
                <a href="account.html" class="leftItems">
                    <div class="bi bi-person-circle"></div>
                </a>
                <a id="logout" class="leftItems">
                    <div class="bi bi-box-arrow-right"></div>
                </a>
            </div>
        </div>
        <div class="content">
            <div class="map-buttons">
                <div class="action-buttons">
                    <input type="text" id="searchbox" class="searchbox" placeholder="Search Location" />
                    <button id="search" class="search bi bi-search"></button>
                    <button id="gps" class="gps bi bi-geo-alt"></button>
                </div>
                <div id="map" class="canvas"></div>
            </div>
            <div class="sidebar" id="sidebar">
                <div><p>Nearby Mechanics:</p></div>
                <div id="mechanics"></div>
            </div>
        </div>
    </div>
    <script src="js/index.js"></script>
</body>

</html>
