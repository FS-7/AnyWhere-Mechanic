<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Page</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/register.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="container">
        <div class="avatar"><i class="bi bi-person-circle avatar-icon"></i></div>
        <form class="form" id="register_form">

            <div class="form-group">
                <label for="firstname">FIRST NAME:</label>
                <input type="text" id="firstname" name="firstname" placeholder="First Name" required minlength="2" maxlength="32">
            </div>

            <div class="form-group">
                <label for="lastname">LAST NAME:</label>
                <input type="text" id="lastname" name="lastname" placeholder="Last Name" required minlength="2" maxlength="32">
            </div>

            <div class="form-group">
                <label for="email">EMAIL:</label>
                <input type="email" id="email" name="email" placeholder="Email" required minlength="2" maxlength="256">
            </div>

            <div class="form-group">
                <label for="phone">PHONE:</label>
                <input type="tel" id="phone" name="phone" placeholder="Phone" required minlength="10" maxlength="10">
            </div>

            <div class="form-group">
                <label for="password">PASSWORD:</label>
                <input type="password" id="password" name="password" placeholder="Password" required minlength="8" maxlength="32">
            </div>

            <div class="form-group">
                <label for="confirm_password">RE-ENTER PASSWORD:</label>
                <input type="password" id="confirm_password" name="confirm_password" placeholder="Confirm Password" required minlength="8" maxlength="32">
            </div>
            <input type="submit" value="REGISTER" class="register-btn" >
        </form>
        <p>Already Signed Up?: <a href="login.html">Login</a></p>
    </div>
</body>
<script>
    const registerFormOnSubmit = async (e) => {
        e.preventDefault();

        const data = new URLSearchParams();
        for (let pair of new FormData(e.target))
            data.append(pair[0], [pair[1]])

        const response = await fetch('http://localhost:8000/users/register', { method: 'POST', body: data}).catch(x => console.log(x))
        if(response.status == 401)
            window.location.href = '/login.html'
        
        if(response.status == 200){
            const res = await (response).text().catch(x => console.log(x))
            window.location.href = "/"
        }
        
    }
    document.getElementById('register_form').addEventListener('submit', registerFormOnSubmit)
</script>

</html>
