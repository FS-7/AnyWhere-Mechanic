<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>
    <link rel="stylesheet" href="css/register.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
</head>

<body>
    <div class="container">
        <div class="avatar"><i class="bi bi-person-circle avatar-icon"></i></div>
        <form class="form" id="login_form" method="post">
            <div class="form-group"> 
                <label for="email">EMAIL:</label>
                <input type="text" id="email" name="email" placeholder="Email" required minlength="2" maxlength="256">
            </div>

            <div class="form-group">
                <label for="password">PASSWORD:</label>
                <input type="password" id="password" name="password" placeholder="Password" required minlength="8" maxlength="32">
            </div>
            <div><input type="submit" class="register-btn" value="LOGIN" /></div>
            <p>Create a new account: <a href="register.html">Register</a></p>
        </form>
    </div>
    <script>
        const loginFormOnSubmit = async (e) => {
            e.preventDefault();

            const data = new URLSearchParams();
            for (let pair of new FormData(e.target))
                data.append(pair[0], [pair[1]])

            const response = await fetch('http://localhost:8000/users/login', { method: 'POST', body: data}).catch(x => console.log(x))
            if(response.status == 401)
                window.location.href = '/login.html'
            
            if(response.status == 200){
                const res = await (response).json().catch(x => console.log(x))
                localStorage.setItem('token', res.token)
                window.location.href = "/"
            }
        }
        document.getElementById('login_form').addEventListener('submit', loginFormOnSubmit)
    </script>
</body>

</html>
