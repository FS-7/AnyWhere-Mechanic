<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Registration Page</title>
    <link rel="stylesheet" href="css/shared.css">
    <link rel="stylesheet" href="css/garage.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.13.1/font/bootstrap-icons.min.css">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" crossorigin="" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" crossorigin=""></script>
    
</head>

<body>
    <div class="container">
        <div class="navbar">
            <a href="/" class="logo">ANYWHERE MECHANIC</a>
            <div class="right">
                <a href="/" class="link">HOME</a>
                <a href="my_booking.html" class="link">MY BOOKINGS</a>
                <a href="booking.html" class="link">BOOKINGS</a>
                <a href="garage.html" class="link">REGISTER GARAGE</a>
            </div>
            <div class="left">
                <a href="#" class="leftItems">
                    <div class="bi bi-bell"></div>
                </a>
                <a href="admin.html" class="leftItems">
                    <div class="bi bi-person-fill-lock"></div>
                </a>
                <a href="account.html" class="leftItems">
                    <div class="bi bi-person-circle"></div>
                </a>
                <a id="logout" class="leftItems">
                    <div class="bi bi-box-arrow-right"></div>
                </a>
            </div>
        </div>
        <div class="content">
            <div id="map" class="map"></div>
            <div class="register-container">
                <form id="form" class="form">
                    <div class="form-group">
                        <label for="garage_name">GARAGE NAME:</label>
                        <input type="text" id="garage_name" name="garage_name" placeholder="Garage Name" required minlength="2" maxlength="32">
                    </div>

                    <div class="form-group">
                        <label for="loc_lat">LOCATION LATITUDE:</label>
                        <input type="text" id="loc_lat" name="loc_lat" placeholder="Location Latitude" disabled>
                    </div>

                    <div class="form-group">
                        <label for="loc_lon">LOCATION LONGITUDE:</label>
                        <input type="text" id="loc_lon" name="loc_lon" placeholder="Location Longitude" disabled>
                    </div>

                    <div class="form-group">
                        <label for="address">ADDRESS:</label>
                        <input type="text" id="address" name="address" placeholder="Address" required minlength="2" maxlength="256">
                    </div>

                    <div class="form-group">
                        <label for="pincode">PINCODE:</label>
                        <input type="number" id="pincode" name="pincode" placeholder="Pincode" required minlength="4" maxlength="8">
                    </div>

                    <input type="submit" value="REGISTER" class="register-btn" />
                </form>
            </div>
        </div>
    </div>
</body>
<script src="js/garage.js" ></script>
</html>
